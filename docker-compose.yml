services:
  postgres:
    image: postgres:16-alpine
    container_name: epn_postgres
    environment:
      POSTGRES_USER: epn
      POSTGRES_PASSWORD: epn
      POSTGRES_DB: epn
    ports:
      - "5432:5432"
    volumes:
      - epn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: epn_redis
    ports:
      - "6379:6379"
    volumes:
      - epn_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  epn_pgdata:
  epn_redisdata:
